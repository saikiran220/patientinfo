name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/patient-backend ./backend

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/patient-backend

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/patient-frontend \
            --build-arg VITE_API_URL=http://${{ secrets.EC2_HOST }}:8000 \
            ./frontend

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/patient-frontend

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/patient-backend
            docker pull ${{ secrets.DOCKER_USERNAME }}/patient-frontend

            # Stop old containers
            docker stop backend-container || true
            docker rm backend-container || true
            docker stop frontend-container || true
            docker rm frontend-container || true

            # Run backend
            docker run -d -p 8000:8000 --restart unless-stopped \
              --name backend-container \
              -e SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
              -e SUPABASE_KEY=${{ secrets.SUPABASE_KEY }} \
              ${{ secrets.DOCKER_USERNAME }}/patient-backend

            # Run frontend
            docker run -d -p 5173:5173 --restart unless-stopped \
              --name frontend-container \
              ${{ secrets.DOCKER_USERNAME }}/patient-frontend
